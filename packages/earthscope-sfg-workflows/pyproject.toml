[build-system]
requires = [
    "setuptools>=62.6",
    "setuptools_scm[toml]>=6.2",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "earthscope-sfg-workflows"
description = "EarthScope seafloor geodesy workflow orchestration — pipelines, data management, modeling, and configuration"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">= 3.11"
authors = [
    { name = "Mike Gottlieb", email = "mike.gottlieb@earthscope.org" },
    { name = "Franklyn Dunbar", email = "franklyn.dunbar@earthscope.org" },
    { name = "Rachel Akie", email = "rachel.akie@earthscope.org" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dynamic = ["version"]

dependencies = [
    "earthscope-sfg[tiledb]",
    "boto3>=1.40",
    "botocore>=1.40",
    "sqlalchemy>=2.0",
    "python-dotenv>=1.1",
    "tqdm>=4.60",
    "seaborn>=0.13",
    "earthscope-sdk>=1.1",
    "earthscope-cli>=1.0",
    "gnatss>=0.3.1",
    "cloudpathlib[s3]>=0.20",
    "pyarrow>=21.0",
    "pride-ppp @ git+https://github.com/EarthScope/GNSSommelier.git#subdirectory=packages/pride-ppp",
]

[project.urls]
Homepage = "https://github.com/EarthScope/es_sfgtools"
ReadTheDocs = "https://es-sfgtools.readthedocs.io/en/latest/"

[tool.setuptools_scm]
root = "../.."

[tool.setuptools]
package-dir = { "es_sfgtools" = "src" }
packages = [
  "es_sfgtools.config",
  "es_sfgtools.data_mgmt",
  "es_sfgtools.data_mgmt.assetcatalog",
  "es_sfgtools.data_mgmt.directorymgmt",
  "es_sfgtools.data_mgmt.ingestion",
  "es_sfgtools.data_models",
  "es_sfgtools.data_models.metadata",
  "es_sfgtools.modeling",
  "es_sfgtools.modeling.garpos_tools",
  "es_sfgtools.prefiltering",
  "es_sfgtools.workflows",
  "es_sfgtools.workflows.midprocess",
  "es_sfgtools.workflows.modeling",
  "es_sfgtools.workflows.pipelines",
  "es_sfgtools.workflows.preprocess_ingest",
  "es_sfgtools.workflows.utils",
]
