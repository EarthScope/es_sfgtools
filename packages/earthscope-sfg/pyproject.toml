[build-system]
requires = [
    "setuptools>=62.6",
    "setuptools_scm[toml]>=6.2",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "earthscope-sfg"
description = "EarthScope seafloor geodesy parsing — NovaTel, Sonardyne, PRIDE-PPPAR, and shared data models"
readme = "README.md"
requires-python = ">= 3.11"
authors = [
    { name = "Mike Gottlieb", email = "mike.gottlieb@earthscope.org" },
    { name = "Franklyn Dunbar", email = "franklyn.dunbar@earthscope.org" },
    { name = "Rachel Akie", email = "rachel.akie@earthscope.org" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dynamic = ["version"]

dependencies = [
    "numpy>=1.23.5,<2",
    "scipy>=1.16.3",
    "pandas>=2.0",
    "matplotlib>=3.7",
    "julian>=0.14",
    "pandera>=0.18",
    "pydantic>=2.0",
    "pyproj>=3.6",
    "pymap3d>=3.0",
    "regex>=2023.0",
    "colorama>=0.4.6",
    "tqdm>=4.60",
]

[project.optional-dependencies]
tiledb = [
    "tiledb>=0.34.2",
    "cloudpathlib[s3]>=0.20",
]

[project.urls]
Homepage = "https://github.com/EarthScope/es_sfgtools"
ReadTheDocs = "https://es-sfgtools.readthedocs.io/en/latest/"

[tool.setuptools_scm]
root = "../.."  

[tool.setuptools]
package-dir = { "es_sfgtools" = "src" }
packages = [
  "es_sfgtools.logging",
  "es_sfgtools.novatel_tools",
  "es_sfgtools.sonardyne_tools",
  "es_sfgtools.seafloor_site_tools",
  "es_sfgtools.utils",
  "es_sfgtools.data_models",
  "es_sfgtools.tiledb_schemas",
]

# =============================================================================
# Pixi workspace configuration
# =============================================================================
[tool.pixi.workspace]
name = "earthscope-sfg"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]
conda-pypi-map = {}

# =============================================================================
# Tasks
# =============================================================================
[tool.pixi.tasks]
build-go = { cmd = "make -B", cwd = "go" }
debug-go = { cmd = "make debug", cwd = "go" }
test = "pytest tests/ -v"

# =============================================================================
# Conda dependencies
# =============================================================================
[tool.pixi.dependencies]
python = ">=3.11"
pip = ">=24.0"
uv = "*"
numpy = ">=1.23.5,<2"
proj = "*"

# TileDB (needed for Go CGO build and optional Python extras)
tiledb = "2.30.*"
tiledb-py = "*"

# Build / compiler toolchain for Go binaries
setuptools = ">=62.6"
setuptools_scm = ">=6.2"
wheel = "*"
clang = "*"
go = ">=1.22"
make = "*"

# Testing
pytest = ">=9.0.2,<10"

# =============================================================================
# Platform-specific conda dependencies
# =============================================================================
[tool.pixi.target.linux-64.dependencies]
gcc = ">=15"
libstdcxx-ng = ">=15"

[tool.pixi.target.linux-aarch64.dependencies]
gcc = ">=15"
libstdcxx-ng = ">=15"

# =============================================================================
# PyPI dependencies — install this package in editable mode
# =============================================================================
[tool.pixi.pypi-dependencies]
earthscope-sfg = { path = ".", editable = true }
