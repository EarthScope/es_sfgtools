name: seafloor_geodesy
channels:
  - defaults
dependencies: 
  - python=3.11
  - pip
  - numpy
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - scikit-sparse
  - julian
  - pandera
  - pyarrow
  - pydantic
  - pyproj
  - pymap3d
  - boto3
  - botocore
  - tqdm
  - nodejs
  - nbgitpuller
