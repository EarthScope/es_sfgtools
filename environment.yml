    - -e .
    - garpos @ git+https://github.com/EarthScope/garpos.git
    - earthscope-sdk
    - earthscope-cli
    - sphinx==7.4.7
    - sphinx-rtd-theme==2.0.0
    - myst-parser==4.0.0
    - sphinxcontrib-apidoc==0.5.0
    - sphinx_pyproject==0.3.0