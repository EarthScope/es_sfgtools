[workspace]
name = "es_sfgtools"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64","linux-aarch64", "osx-64", "osx-arm64"]
conda-pypi-map = {}
members = [
  "packages/earthscope-sfg",
  "packages/workflows",
  "packages/cli",
  "packages/meta",
]

# =============================================================================
# Tasks
# =============================================================================
[tasks]
lint = "black --check src/"
format = "ruff format src/"
docs = { cmd = "make html", cwd = "docs" }
build-novatel-go = { cmd = "make -B", cwd = "packages/earthscope-sfg" }

# Clone and install garpos from source
clone-garpos = { cmd = "bash -c 'cd garpos/ && git pull || git clone https://github.com/s-watanabe-jhod/garpos.git'",cwd="external/"}
compile-garpos = {cmd = "gfortran -shared -fPIC -fopenmp -O3 -o lib_raytrace.so sub_raytrace.f90 lib_raytrace.f90",cwd = "external/garpos/bin/garpos_v102/f90lib", depends-on = ["clone-garpos"]}
test-garpos = "pytest tests/test_garpos.py -v"

# Clone and install PRIDE-PPPAR
clone-pride = { cmd = "bash -c 'cd PRIDE-PPPAR/ && git pull || git clone --depth 1 https://github.com/PrideLab/PRIDE-PPPAR.git'", cwd = "external/"}
install-pride = { cmd = "chmod +x install.sh && echo 'N' | HOME=$PIXI_PROJECT_ROOT/external ./install.sh", cwd = "external/PRIDE-PPPAR", depends-on = ["clone-pride"] }
test-pride = { cmd = "chmod +x test.sh && ./test.sh", cwd = "external/PRIDE-PPPAR/example"}

setup = {depends-on = ["compile-garpos","install-pride","build-novatel-go"]}
test-setup = {depends-on = ["test-garpos","test-pride"]}


# =============================================================================
# Conda dependencies (things that need to come from conda-forge)
# =============================================================================
[dependencies]
python = ">=3.11"
pip = ">=24.0"
uv = "*"

# Core conda dependencies (native libs / better binary compat)
numpy = ">=1.23.5,<2"
proj = "*"

tiledb = "2.30.*"
tiledb-py = "*"
scikit-learn = ">=1.7"
pyarrow = "==21.0.0"

# Build / compiler dependencies
setuptools = ">=62.6"
setuptools_scm = ">=6.2"
wheel = "*"
clang = "*"
go = ">=1.22"
make = "*"
requests = ">=2.33.1,<3"
pytest = ">=9.0.2,<10"

# =============================================================================
# Platform-specific conda dependencies
# =============================================================================

[target.osx-64.dependencies]
scikit-sparse = "*"

[target.osx-arm64.dependencies]
scikit-sparse = "*"
gfortran = ">=15.2.0"


[target.linux-64.dependencies]
gfortran = ">=15.2.0"
bc = "1.07.*"
sqlite = ">=3.49.1"
gcc = ">=15"
libstdcxx-ng = ">=15"
nodejs = ">=24"
scikit-learn = ">=1.7.2"
scikit-sparse = "*"

[target.linux-aarch64.dependencies]
gfortran = ">=15.0"
bc = "1.07.*"
sqlite = ">=3.49.1"
gcc = ">=15"
libstdcxx-ng = ">=15"
nodejs = ">=24"
scikit-learn = ">=1.7.2"
suitesparse = "*"

[target.linux-aarch64.pypi-dependencies]
scikit-sparse = { version = ">=0.4.16, <0.5" }



# =============================================================================
# PyPI dependencies - install this package in editable mode
# This pulls in all dependencies from pyproject.toml [project.dependencies]
# =============================================================================
[pypi-dependencies]
earthscope-sfg = { path = "packages/earthscope-sfg", editable = true }
es-sfgtools-workflows = { path = "packages/workflows", editable = true }
es-sfgtools-cli = { path = "packages/cli", editable = true }

# =============================================================================
# Feature: dev (adds dev tools)
# =============================================================================
[feature.dev.dependencies]
black = "*"

[feature.dev.pypi-dependencies]
# Optional dev deps from pyproject.toml are installed via editable install
# Add any extra dev-only PyPI packages here if needed

# =============================================================================
# Feature: notebook (adds Jupyter support)
# =============================================================================
[feature.notebook.dependencies]
ipykernel = "*"
jupyterlab = "*"

# =============================================================================
# Environments
# =============================================================================
[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
notebook = { features = ["notebook"], solve-group = "default" }
full = { features = ["dev", "notebook"], solve-group = "default" }

# =============================================================================
# Activation - environment variables
# =============================================================================
[activation]
[activation.env]
CGO_ENABLED = "1"
PIP_INDEX_URL = "https://pypi.org/simple"
GARPOS_PATH = "$PIXI_PROJECT_ROOT/external/garpos"
PATH = "~/.PRIDE_PPPAR_BIN:$PATH"
DYLD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/$PIXI_ENVIRONMENT_NAME/lib:$DYLD_LIBRARY_PATH"
LD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/$PIXI_ENVIRONMENT_NAME/lib:$LD_LIBRARY_PATH"
